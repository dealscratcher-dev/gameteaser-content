# netlify.toml — root of monorepo
# Netlify builds the Next.js app in apps/web and serves it with
# @netlify/plugin-nextjs. Keep Edge-only routes out of the app unless the
# Netlify Next runtime supports the exact Next version in use.
[build]
  base    = "."
  command = "pnpm install --no-frozen-lockfile && node scripts/build-ads-config.js && pnpm --filter web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION  = "22"
  PNPM_VERSION  = "9"
  TURBO_TELEMETRY_DISABLED = "1"
  NEXT_TELEMETRY_DISABLED  = "1"
  NEXT_OTEL_FEATURE_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type  = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/llm.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/data/*"
  [headers.values]
    Content-Type               = "application/javascript; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
