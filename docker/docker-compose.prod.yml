# ============================================================
# TheGameBit – docker-compose.prod.yml
# Production environment
# Usage:  docker compose -f docker/docker-compose.prod.yml up -d
# ============================================================

name: thegamebit-prod

services:
  # ── Next.js App ─────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: production
    image: thegamebit-web:${APP_VERSION:-latest}
    container_name: tgb-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"

      # Supabase
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # Redis – internal service name, no exposed port
      REDIS_URL: redis://redis:6379

      # App
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tgb-prod

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: tgb-redis
    restart: always
    # No port exposed in prod – internal access only
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 300 1
      --save 60 100
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 300M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - tgb-prod

volumes:
  redis-prod-data:
    driver: local

networks:
  tgb-prod:
    driver: bridge
